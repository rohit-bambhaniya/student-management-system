<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student_Dashboard</title>
</head>
<body>
    {% extends 'base.html' %}

{% block title %}
Dashboard
{% endblock %}

{% block content %}

<div class="row">

    <div class="col-md-3 mb-4">
        <div class="card card-box p-3 bg-primary text-white">
            <h5>Total Students</h5>
            <h2>250</h2>
        </div>
    </div>

    <div class="col-md-3 mb-4">
        <div class="card card-box p-3 bg-success text-white">
            <h5>Total Teachers</h5>
            <h2>20</h2>
        </div>
    </div>

    <div class="col-md-3 mb-4">
        <div class="card card-box p-3 bg-warning text-white">
            <h5>Attendance</h5>
            <h2>90%</h2>
        </div>
    </div>

    <div class="col-md-3 mb-4">
        <div class="card card-box p-3 bg-danger text-white">
            <h5>Pending Fees</h5>
            <h2>15</h2>
        </div>
    </div>

</div>

{% endblock %}
</body>
</html>
