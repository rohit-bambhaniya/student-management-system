<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body{
            text-align: center;
        }
    </style>
</head>
<body>
    <h2>Login</h2>

<form method="POST">

    {% csrf_token %}

    <input type="text" name="username"><br><br>

    <input type="password" name="password"><br><br>

    <button type="submit">
        Login
    </button>

</form>
</body>
</html>
