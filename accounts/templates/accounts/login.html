<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- Include Bootstrap CSS for your classes to work -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .login-box {
            width: 100%;
            max-width: 400px;
            margin: 100px auto;
            background: #ffffff; /* Changed to white for better readability */
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        /* Optional: Style the heading to match your original red theme */
        .login-header {
            color: #cf4343;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h3 class="text-center mb-4 login-header">Login</h3>

    <!-- Django Messages Framework -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-primary w-100" style="background-color: #cf4343; border: none;">
                Login
            </button>
        </div>
    </form>
</div> 

<!-- Bootstrap JS (Optional, for dismissing alerts) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.min.js"></script>
</body>
</html>
