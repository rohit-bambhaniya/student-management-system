<!DOCTYPE html>
<html>
<head>
    <title>Attendance Report</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        .container {
            width: 80%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #007bff;
            color: white;
        }

        .present {
            color: green;
            font-weight: bold;
        }

        .absent {
            color: red;
            font-weight: bold;
        }

        .error {
            color: red;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Attendance Report</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <table>
        <tr>
            <th>Student</th>
            <th>Date</th>
            <th>Status</th>
        </tr>

        {% for record in records %}
        <tr>
            <td>{{ record.student.student_name }}</td>
            <td>{{ record.date }}</td>

            <td class="{% if record.status == 'P' %}present{% else %}absent{% endif %}">
                {% if record.status == 'P' %}
                    Present
                {% else %}
                    Absent
                {% endif %}
            </td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
