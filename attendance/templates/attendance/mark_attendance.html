<!DOCTYPE html>
<html>
<head>
    <title>Mark Attendance</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        .container {
            width: 80%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #007bff;
            color: white;
        }

        .btn {
            padding: 6px 12px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .present {
            background: #28a745;
            color: white;
        }

        .absent {
            background: #dc3545;
            color: white;
        }

        .submit-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .error {
            color: red;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Mark Attendance</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <table>
            <tr>
                <th>Student Name</th>
                <th>Roll No</th>
                <th>Present</th>
                <th>Absent</th>
            </tr>

            {% for student in students %}
            <tr>
                <td>{{ student.student_name }}</td>
                <td>{{ student.roll_num }}</td>

                <td>
                    <input type="radio" name="student_{{ student.id }}" value="P">
                </td>

                <td>
                    <input type="radio" name="student_{{ student.id }}" value="A">
                </td>
            </tr>
            {% endfor %}

        </table>

        <button type="submit" class="submit-btn">Save Attendance</button>
    </form>

</div>

</body>
</html>
