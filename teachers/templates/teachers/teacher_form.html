{% extends 'base.html' %}

{% block title %}
Add Student
{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow p-4">

        <h2 class="mb-4">
            Add Teacher
        </h2>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-primary">
                Save Teacher
            </button>

        </form>

    </div>

</div>

{% endblock %}
