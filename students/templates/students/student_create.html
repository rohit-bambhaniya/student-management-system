<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    {% extends 'base.html' %}

{% block title %}
Add Student
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="card shadow-lg border-0 p-4 rounded-4">

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

                Add Student

            </button>

            

        </form>

        

    </div>

</div>

{% endblock %}
</body>
