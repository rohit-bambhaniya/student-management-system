<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    {% extends 'base.html' %}

{% block title %}
Add Student
{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow p-4">

        <h2 class="mb-4">
            Add Student
        </h2>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-primary">
                Save Student
            </button>

        </form>

    </div>

</div>

{% endblock %}
</body>
</html>
